patch_settings:
  name: Patch settings
  description: Send a partial JSON patch to the tablet (same keys as the LAN web GUI).
  target:
    entity:
      integration: media_frame
  fields:
    patch:
      name: Settings patch
      description: "Key/value object (for example slideshowEnabled and slideshowIdleSec)."
      required: true
      selector:
        object:

call_action:
  name: Call integration action
  description: POST an integration action (roon/transport, musicid/listenNow, and similar).
  target:
    entity:
      integration: media_frame
  fields:
    action:
      name: Action path
      description: Path after /api/v1/
      required: true
      example: roon/transport
      selector:
        text:
    body:
      name: JSON body
      description: Optional POST body object.
      required: false
      selector:
        object:
    wait:
      name: Wait for result
      description: Poll action-result until complete.
      required: false
      default: true
      selector:
        boolean:
