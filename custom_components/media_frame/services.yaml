patch_settings:
  name: Patch settings
  description: Send a partial JSON patch to the tablet (same keys as LAN web GUI / PATCH_KEYS).
  target:
    entity:
      integration: media_frame
  fields:
    patch:
      name: Settings patch
      description: 'Key/value object, e.g. {"slideshowEnabled": true, "fullscreenAnimation": "vinyl"}'
      required: true
      selector:
        object:

call_action:
  name: Call integration action
  description: POST a low-level integration action under /api/v1/ (advanced; prefer entities for appearance and toggles).
  target:
    entity:
      integration: media_frame
  fields:
    action:
      name: Action path
      description: Path after /api/v1/, e.g. system/restartApp
      required: true
      example: system/restartApp
      selector:
        text:
    body:
      name: JSON body
      description: Optional POST body object.
      required: false
      default: {}
      selector:
        object:
    wait:
      name: Wait for result
      description: Poll action-result until complete (default true).
      required: false
      default: true
      selector:
        boolean:
