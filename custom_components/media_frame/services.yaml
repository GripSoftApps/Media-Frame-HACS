patch_settings:
  name: Patch settings
  description: Send a partial JSON patch to the tablet (same keys as LAN web GUI / PATCH_KEYS).
  fields:
    entity_id:
      name: Entity
      description: Any Media Frame entity on the target tablet.
      required: true
      selector:
        entity:
          integration: media_frame
    patch:
      name: Settings patch
      description: Key/value object, e.g. {"slideshowEnabled": true, "slideshowIdleSec": 60}
      required: true
      selector:
        object:

call_action:
  name: Call integration action
  description: POST an integration action (roon/transport, musicid/listenNow, etc.).
  fields:
    entity_id:
      name: Entity
      required: true
      selector:
        entity:
          integration: media_frame
    action:
      name: Action path
      description: Path after /api/v1/, e.g. roon/transport
      required: true
      example: roon/transport
      selector:
        text:
    body:
      name: JSON body
      description: Optional POST body object.
      required: false
      default: {}
      selector:
        object:
    wait:
      name: Wait for result
      description: Poll action-result until complete (default true).
      required: false
      default: true
      selector:
        boolean:
